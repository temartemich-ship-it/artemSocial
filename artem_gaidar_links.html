<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artem Gaidar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0e9dc;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem 1rem;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: #fffdf9;
      border: 0.5px solid #e2d5c3;
      border-radius: 24px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2.5px solid #c9b49a;
      object-fit: cover;
      margin-bottom: 1rem;
    }
    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: #2c1e14;
      margin-bottom: 4px;
      text-align: center;
    }
    .handle {
      font-size: 13px;
      color: #8c7060;
      margin-bottom: 1.75rem;
      letter-spacing: .5px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #a08878;
      align-self: flex-start;
      margin-bottom: 10px;
    }
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 14px;
      border: 0.5px solid #e2d5c6;
      background: #faf4ec;
      text-decoration: none;
      transition: background .15s, border-color .15s;
      width: 100%;
    }
    .link-btn:hover { background: #f0e8d8; border-color: #c9b49a; }
    .icon-wrap {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg { width: 22px; height: 22px; }
    .link-name { font-size: 15px; font-weight: 500; color: #2c1e14; flex: 1; }
    .arrow { color: #a08878; font-size: 18px; line-height: 1; }
    .li-bg { background: #0077B5; }
    .ig-bg { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
    .fb-bg { background: #1877F2; }
    .gh-bg { background: #24292E; }
  </style>
</head>
